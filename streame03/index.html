<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamE03 — Watch Anywhere</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>"
    />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-dot"></span> Stream<span class="brand-accent">E03</span>
      </a>
      <div class="search">
        <input
          id="searchInput"
          type="search"
          placeholder="Search titles, genres…"
          autocomplete="off"
        />
      </div>
      <nav class="nav">
        <a href="index.html" class="active">Home</a>
        <a href="#movies">Movies</a>
        <a href="#tv">Shows</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-inner">
        <h1>Stream what you love.</h1>
        <p>Thousands of titles, one quiet player. No ads, no noise — just play.</p>
        <a class="cta" href="#catalog">Browse catalog</a>
      </div>
    </section>

    <main class="container">
      <div class="catalog-head">
        <h2>Browse</h2>
        <div class="filters" id="filters"></div>
      </div>
      <section id="catalog" class="grid"></section>
      <p id="empty" class="empty" hidden>No titles match your search.</p>
    </main>

    <footer class="footer">
      <p>StreamE03 — a demo VOD site. Streams are public HLS test sources.</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
